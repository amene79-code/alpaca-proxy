name: Pro Agent

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Run Pro Agent cycle
        env:
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          ALPACA_URL:    ${{ secrets.ALPACA_URL }}
        run: node scripts/pro-agent.js

      - name: Wait or exit based on market hours
        run: |
          HOUR=$(date -u +%H)
          DAY=$(date -u +%u)
          if [ "$DAY" -le 5 ] && [ "$HOUR" -ge 13 ] && [ "$HOUR" -lt 21 ]; then
            echo "Market hours — sleeping 10 minutes before next cycle"
            sleep 600
          else
            echo "Outside market hours — stopping loop"
          fi

      - name: Commit state and trigger next cycle
        run: |
          HOUR=$(date -u +%H)
          DAY=$(date -u +%u)
          git config user.name  "Pro Agent Bot"
          git config user.email "bot@pro-agent"
          git add state/state.json state/watchlist.json
          if [ "$DAY" -le 5 ] && [ "$HOUR" -ge 13 ] && [ "$HOUR" -lt 21 ]; then
            git diff --staged --quiet || git commit -m "state: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
          else
            echo "Outside market hours — not committing to avoid infinite loop"
          fi
