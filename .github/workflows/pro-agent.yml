name: Pro Agent

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Run Pro Agent cycle
        env:
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          ALPACA_URL:    ${{ secrets.ALPACA_URL }}
        run: node scripts/pro-agent.js

      - name: Sleep 10 minutes
        run: sleep 600

      - name: Commit and continue loop (market hours only)
        run: |
          HOUR=$(date -u +%H)
          DAY=$(date -u +%u)
          git config user.name  "Pro Agent Bot"
          git config user.email "bot@pro-agent"
          git add state/state.json state/watchlist.json
          if [ "$DAY" -le 5 ] && [ "$HOUR" -ge 12 ] && [ "$HOUR" -lt 20 ]; then
            git diff --staged --quiet || git commit -m "state: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
            echo "Loop continues"
          else
            echo "Outside market hours — chain stops"
          fi
