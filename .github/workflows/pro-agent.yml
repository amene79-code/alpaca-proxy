name: Pro Agent
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/pro-agent.js'
      - 'state/watchlist.json'
  schedule:
    # ─── CRON-ONLY DRIVER ────────────────────────────────────────────────────
    # The */10 cron is the SOLE cadence source. It fires independently every 10
    # minutes 13:00-20:00 UTC (covers the 9:30am-4pm ET session) and — unlike a
    # self-dispatch chain — it cannot "die": GitHub re-fires it every weekday on
    # its own, so a holiday, a failed run, or a weekend can never break the loop.
    # No warmup cron needed; the agent's own holiday/clock check stands it down
    # when the market is closed.
    - cron: '*/10 13-20 * * 1-5'

# ─── Single-runner guarantee ─────────────────────────────────────────────────
# Every trigger (the */10 cron, manual dispatch, push) shares ONE queue. If a
# cron run fires while a previous one is still finishing, the new one waits its
# turn instead of running in parallel — so two agents never hit the same Alpaca
# account at once (the June-2 churn cause). cancel-in-progress:false lets the
# active cycle finish managing/placing trades rather than being killed mid-run.
concurrency:
  group: pro-agent-singleton
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: cd scripts && npm install
      - name: Run Pro Agent cycle
        env:
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          ALPACA_URL:    ${{ secrets.ALPACA_URL }}
        run: node scripts/pro-agent.js
      - name: Commit state changes
        run: |
          git config user.name  "Pro Agent Bot"
          git config user.email "bot@pro-agent"
          git add state/state.json state/watchlist.json
          git diff --staged --quiet || git commit -m "state: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
