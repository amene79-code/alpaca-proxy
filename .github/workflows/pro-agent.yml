name: Pro Agent
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/pro-agent.js'
      - 'state/watchlist.json'
  schedule:
    # Warmup — first fire 13:00 UTC (14:00 UK BST), 30 min before the open
    - cron: '0 13 * * 1-5'
    # Trading window — every 10 min 13:00-20:00 UTC (covers 9:30am-4pm ET session)
    - cron: '*/10 13-20 * * 1-5'
jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: cd scripts && npm install
      - name: Run Pro Agent cycle
        env:
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          ALPACA_URL:    ${{ secrets.ALPACA_URL }}
        run: node scripts/pro-agent.js
      - name: Commit state changes
        run: |
          git config user.name  "Pro Agent Bot"
          git config user.email "bot@pro-agent"
          git add state/state.json state/watchlist.json
          git diff --staged --quiet || git commit -m "state: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
      - name: sleep 600
        run: sleep 600
      - name: Schedule next or stop
        run: |
          # Re-dispatch only inside the run window: 13:00-20:30 UTC, Mon-Fri.
          # 30 min before the US open (13:30 UTC) through 30 min after the close (20:00 UTC).
          NOW=$(date -u +%H%M)   # HHMM, e.g. 1305, 2030
          DOW=$(date -u +%u)     # 1=Mon .. 7=Sun
          if [ "$DOW" -le 5 ] && [ "$NOW" -ge 1300 ] && [ "$NOW" -le 2030 ]; then
            echo "Inside run window ($NOW UTC) — triggering next cycle"
            gh workflow run pro-agent.yml --ref main
          else
            echo "Outside run window ($NOW UTC) — chain stops until next scheduled start"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
